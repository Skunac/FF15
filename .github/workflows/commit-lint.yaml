---
name: Commit lint

on:
  push:
    branches:
      - main
  pull_request: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: Commit lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -eu
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ -z "${BASE_SHA:-}" ] || [ "${BASE_SHA}" = "${NULL_SHA}" ]; then
            range="${HEAD_SHA}~1..${HEAD_SHA}"
          else
            range="${BASE_SHA}..${HEAD_SHA}"
          fi

          chmod +x .githooks/commit-msg

          failed=0
          tmpfile=$(mktemp)
          for sha in $(git rev-list --reverse "$range"); do
            git log -1 --format=%B "$sha" > "$tmpfile"
            subject=$(head -n 1 "$tmpfile")
            if .githooks/commit-msg "$tmpfile" >/dev/null 2>&1; then
              printf '  OK    %s  %s\n' "${sha:0:8}" "$subject"
            else
              printf '  FAIL  %s  %s\n' "${sha:0:8}" "$subject"
              failed=1
            fi
          done
          rm -f "$tmpfile"

          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "One or more commits do not match the gitmoji-alias convention."
            echo "See docs/ADR/0008-gitmoji-alias-commit-convention.md or .githooks/README.md."
            exit 1
          fi
